<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Select Section - SchoolMS</title>
    <th:block th:replace="fragments/styles :: common-styles"></th:block>
</head>
<body>
<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <i class="fas fa-graduation-cap me-2"></i>
            SchoolMS
        </div>
        <div class="sidebar-subtitle">Management System</div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-item">
            <a href="/" class="nav-link">
                <i class="fas fa-tachometer-alt nav-icon"></i>
                Dashboard
            </a>
        </div>

        <div class="nav-item">
            <a href="/students" class="nav-link active">
                <i class="fas fa-user-graduate nav-icon"></i>
                Students
            </a>
        </div>

        <div class="nav-item">
            <a href="/exams" class="nav-link">
                <i class="fas fa-file-alt nav-icon"></i>
                Exams
            </a>
        </div>

        <div class="nav-item">
            <a href="/marks" class="nav-link">
                <i class="fas fa-chart-line nav-icon"></i>
                Marks
            </a>
        </div>

        <div class="nav-item">
            <a href="/reports" class="nav-link">
                <i class="fas fa-chart-pie nav-icon"></i>
                Reports
            </a>
        </div>

        <div class="nav-item">
            <a href="/attendance" class="nav-link">
                <i class="fas fa-calendar-check nav-icon"></i>
                Attendance
            </a>
        </div>
        <div class="nav-item">
            <a href="/settings" class="nav-link">
                <i class="fas fa-cog nav-icon"></i>
                Settings
            </a>
        </div>
    </nav>

    <div class="sidebar-footer">
        <p>© 2024 SchoolMS</p>
        <p>v2.0 Dashboard</p>
    </div>
</div>

<div class="main-content">
    <!-- Top Bar -->
    <div class="top-bar">
        <div>
            <h1 class="page-title">
                <i class="fas fa-user-graduate nav-icon"></i>
                Student Management
            </h1>
            <p class="section-subtitle">Welcome to your School Management System</p>
        </div>

        <div class="user-menu">
                <span class="text-light me-3">
                    <i class="fas fa-user me-2"></i>
                    Welcome, <strong th:text="${fullName}">User</strong>
                </span>
            <a href="/logout" class="btn btn-outline-light btn-sm">
                <i class="fas fa-sign-out-alt me-2"></i>Logout
            </a>
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </div>
    <h2 th:text="'Grade ' + ${grade} + ' - Choose Class'"></h2>
    <div class="row">
        <div th:each="section : ${sections}" class="col-md-3 mb-3">
            <a th:href="@{/students/grade/{g}/{s}(g=${grade}, s=${section})}"
               class="btn btn-primary w-100">
                Class [[${section}]]
            </a>
        </div>
    </div>
</div>
</body>
</html>
