<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add User</title>
    <th:block th:replace="fragments/styles :: common-styles"></th:block>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-3">
            <th:block th:replace="fragments/sidebar :: sidebar"></th:block>
        </div>
        <div class="col-9 mt-4">
            <h2>Add User</h2>
            <form th:action="@{/users/add}" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Full name</label>
                    <input name="fullName" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select" required>
                        <option value="ADMIN">ADMIN</option>
                        <option value="TEACHER">TEACHER</option>
                        <option value="STAFF">STAFF</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" name="active" checked>
                    <label class="form-check-label">Active</label>
                </div>
                <button class="btn btn-primary" type="submit">Save</button>
                <a href="/users" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
<th:block th:replace="fragments/styles :: common-scripts"></th:block>
</body>
</html>
