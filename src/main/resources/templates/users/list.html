<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
    <th:block th:replace="fragments/styles :: common-styles"></th:block>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <script>
        function confirmDelete(id) {
            if (confirm('Delete this user?')) {
                window.location.href = '/users/delete/' + id;
            }
        }
    </script>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-3">
            <th:block th:replace="fragments/sidebar :: sidebar"></th:block>
        </div>
        <div class="col-9 mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Users</h2>
                <a href="/users/add" class="btn btn-primary">Add User</a>
            </div>
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Active</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}"></td>
                        <td th:text="${u.username}"></td>
                        <td th:text="${u.fullName}"></td>
                        <td th:text="${u.role}"></td>
                        <td>
                            <span th:text="${u.active ? 'Yes' : 'No'}" th:classappend="${u.active} ? 'badge bg-success' : 'badge bg-secondary'"></span>
                        </td>
                        <td>
                            <a th:href="@{'/users/edit/' + ${u.id}}" class="btn btn-sm btn-outline-primary me-1">Edit</a>
                            <button class="btn btn-sm btn-outline-danger" th:onclick="|confirmDelete(${u.id})|">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<th:block th:replace="fragments/styles :: common-scripts"></th:block>
</body>
</html>
