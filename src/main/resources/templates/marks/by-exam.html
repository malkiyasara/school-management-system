<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Marks by Exam - SchoolMS</title>
    <th:block th:replace="fragments/styles :: common-styles"></th:block>
</head>
<body>
    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div>
                <h1 class="page-title">
                    <i class="fas fa-file-alt me-3"></i>
                    Marks for <span th:text="${exam.examName}"></span>
                </h1>
                <p class="section-subtitle" th:text="${exam.subject + ' - Class: ' + exam.className}"></p>
            </div>
            
            <div class="user-menu">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <i class="fas fa-moon me-2"></i>
                    Dark Mode
                </button>
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>

        <div class="dashboard-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="card-title mb-0">
                    <i class="fas fa-chart-line me-2"></i>
                    Student Performance
                </h3>
                <a href="/marks" class="btn btn-secondary btn-dashboard">
                    <i class="fas fa-arrow-left me-2"></i>Back to All Marks
                </a>
            </div>
            
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Class</th>
                            <th>Obtained Marks</th>
                            <th>Total Marks</th>
                            <th>Percentage</th>
                            <th>Remarks</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="mark : ${marks}">
                            <td th:text="${mark.student != null ? mark.student.name : 'N/A'}"></td>
                            <td th:text="${mark.student != null ? mark.student.className : 'N/A'}"></td>
                            <td th:text="${mark.obtainedMarks}"></td>
                            <td th:text="${exam.totalMarks}"></td>
                            <td>
                                <span th:if="${exam.totalMarks > 0}" 
                                      th:text="${#numbers.formatDecimal((mark.obtainedMarks * 100.0 / exam.totalMarks), 1, 2) + '%'}"
                                      th:classappend="${mark.obtainedMarks * 100.0 / exam.totalMarks >= 75 ? 'text-success' : (mark.obtainedMarks * 100.0 / exam.totalMarks >= 50 ? 'text-warning' : 'text-danger')}">
                                </span>
                                <span th:unless="${exam.totalMarks > 0}" class="text-muted">N/A</span>
                            </td>
                            <td th:text="${mark.remarks != null ? mark.remarks : ''}"></td>
                            <td>
                                <a th:href="@{/marks/edit/{id}(id=${mark.id})}" class="btn btn-sm btn-warning me-1">
                                    <i class="fas fa-edit me-1"></i>Edit
                                </a>
                                <a th:href="@{/marks/delete/{id}(id=${mark.id})}" 
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Are you sure you want to delete this mark?')">
                                    <i class="fas fa-trash me-1"></i>Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <th:block th:replace="fragments/styles :: common-scripts"></th:block>
</body>
</html>
