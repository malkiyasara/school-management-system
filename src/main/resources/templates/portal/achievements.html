<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Achievements - Parent Portal</title>
    <th:block th:replace="fragments/styles :: common-styles"></th:block>
</head>
<body>
<th:block th:replace="portal/fragments :: portal-header"></th:block>
<div class="container" style="max-width: 1000px; margin: 6vh auto;">
    <div class="dashboard-card mb-3">
        <form method="get">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Student ID</label>
                    <input class="form-control" name="studentId" placeholder="e.g., 6">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" type="submit">Load</button>
                </div>
            </div>
        </form>
    </div>
    <div th:if="${student}">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h4 class="card-title mb-0" th:text="${student.name}"></h4>
            <div class="text-muted" th:text="'Class: ' + ${student.className}"></div>
        </div>
        <div class="dashboard-card">
            <div class="row">
                <div class="col-md-4">
                    <div class="dashboard-card" style="padding:1rem">
                        <div class="stat-label">Best Percentage</div>
                        <div class="stat-number" th:text="${#numbers.formatDecimal(bestPercentage, 1, 'COMMA', 2, 'POINT')}"></div>
                    </div>
                </div>
            </div>
            <div class="table-responsive mt-3">
                <table class="table table-striped mb-0">
                    <thead><tr><th>Exam</th><th>Subject</th><th>Marks</th><th>%</th></tr></thead>
                    <tbody>
                        <tr th:each="m : ${marks}">
                            <td th:text="${m.exam != null ? m.exam.examName : '—'}"></td>
                            <td th:text="${m.exam != null ? m.exam.subject : '—'}"></td>
                            <td th:text="${m.obtainedMarks}"></td>
                            <td th:text="${#numbers.formatDecimal(m.percentage, 1, 'COMMA', 2, 'POINT')}"></td>
                        </tr>
                        <tr th:if="${marks == null or marks.isEmpty()}"><td colspan="4" class="text-center text-muted py-3">No achievements yet</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="portal/fragments :: portal-footer"></th:block>
<th:block th:replace="fragments/styles :: common-scripts"></th:block>
</body>
</html>
