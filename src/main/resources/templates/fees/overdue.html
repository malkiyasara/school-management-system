<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Overdue Fees</title>
    <th:block th:replace="fragments/styles :: common-styles"></th:block>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-3">
            <th:block th:replace="fragments/sidebar :: sidebar"></th:block>
        </div>
        <div class="col-9 mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Overdue Fees</h2>
                <div class="text-muted" th:text="'As of ' + ${asOf}"></div>
            </div>
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Class</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Due</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="fee : ${fees}">
                        <td th:text="${fee.student != null ? fee.student.name : 'N/A'}"></td>
                        <td th:text="${fee.className}"></td>
                        <td th:text="${#numbers.formatDecimal(fee.amount, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td th:text="${fee.status}"></td>
                        <td th:text="${fee.dueDate}"></td>
                        <td th:text="${fee.description}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<th:block th:replace="fragments/styles :: common-scripts"></th:block>
</body>
</html>
