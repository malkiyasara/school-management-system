<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fees</title>
    <th:block th:replace="fragments/styles :: common-styles"></th:block>
    <style>
        .actions { white-space: nowrap; }
    </style>
    <script>
        function confirmDelete(id) {
            if (confirm('Delete this fee record?')) {
                window.location.href = '/fees/delete/' + id;
            }
        }
    </script>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-3">
            <th:block th:replace="fragments/sidebar :: sidebar"></th:block>
        </div>
        <div class="col-9 mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Fees</h2>
                <a href="/fees/add" class="btn btn-primary"><i class="fa fa-plus me-1"></i>Add Fee</a>
            </div>
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Student</th>
                        <th>Class</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Due</th>
                        <th>Paid</th>
                        <th>Description</th>
                        <th class="actions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="fee : ${fees}">
                        <td th:text="${fee.id}"></td>
                        <td th:text="${fee.student != null ? fee.student.name : 'N/A'}"></td>
                        <td th:text="${fee.className}"></td>
                        <td th:text="${#numbers.formatDecimal(fee.amount, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td>
                            <span th:text="${fee.status}" th:classappend="${fee.status == 'PAID'} ? 'badge bg-success' : (${fee.status == 'PARTIAL'} ? 'badge bg-warning text-dark' : 'badge bg-danger')"></span>
                        </td>
                        <td th:text="${fee.dueDate}"></td>
                        <td th:text="${fee.paidDate}"></td>
                        <td th:text="${fee.description}"></td>
                        <td class="actions">
                            <a th:href="@{'/fees/edit/' + ${fee.id}}" class="btn btn-sm btn-outline-primary me-1">Edit</a>
                            <button class="btn btn-sm btn-outline-danger" th:onclick="|confirmDelete(${fee.id})|">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<th:block th:replace="fragments/styles :: common-scripts"></th:block>
</body>
</html>
