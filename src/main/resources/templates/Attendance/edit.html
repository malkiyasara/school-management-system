<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Edit Attendance - SchoolMS</title>
        <th:block th:replace="fragments/styles :: common-styles"></th:block>
    </head>
    <body>
        <!-- Sidebar -->
        <div th:replace="fragments/sidebar :: sidebar"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div>
                    <h1 class="page-title">
                        <i class="fas fa-edit me-3"></i>
                        Edit Attendance
                    </h1>
                    <p class="section-subtitle">Update attendance record</p>
                </div>

                <div class="user-menu">
                    <button class="theme-toggle" onclick="toggleTheme()">
                        <i class="fas fa-moon me-2"></i>
                        Dark Mode
                    </button>
                    <button class="sidebar-toggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>

            <div class="dashboard-card">
                <h3 class="card-title mb-4">
                    <i class="fas fa-calendar-check me-2"></i>
                    Attendance Details
                </h3>

                <form
                    th:action="@{/attendance/edit/{id}(id=${attendance.id})}"
                    method="post"
                >
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="fas fa-user-graduate me-2"></i
                                    >Student:
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    th:value="${attendance.student != null ? attendance.student.name + ' - Class: ' + attendance.student.className : 'N/A'}"
                                    readonly
                                />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="fas fa-calendar me-2"></i>Date:
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    th:value="${#temporals.format(attendance.date, 'dd/MM/yyyy')}"
                                    readonly
                                />
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="status" class="form-label">
                                    <i class="fas fa-clipboard-check me-2"></i
                                    >Status:
                                </label>
                                <select
                                    class="form-control"
                                    id="status"
                                    name="status"
                                    required
                                >
                                    <option
                                        value="Present"
                                        th:selected="${attendance.status == 'Present'}"
                                    >
                                        Present
                                    </option>
                                    <option
                                        value="Absent"
                                        th:selected="${attendance.status == 'Absent'}"
                                    >
                                        Absent
                                    </option>
                                    <option
                                        value="Late"
                                        th:selected="${attendance.status == 'Late'}"
                                    >
                                        Late
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="remarks" class="form-label">
                                    <i class="fas fa-comment me-2"></i>Remarks:
                                </label>
                                <textarea
                                    class="form-control"
                                    id="remarks"
                                    name="remarks"
                                    rows="3"
                                    placeholder="Enter any remarks or comments (optional)"
                                    th:text="${attendance.remarks}"
                                ></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="checkInTime" class="form-label">
                                    <i class="fas fa-clock me-2"></i>Check In
                                    Time:
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="checkOutTime" class="form-label">
                                    <i class="fas fa-clock me-2"></i>Check Out
                                    Time:
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button
                            type="submit"
                            class="btn btn-primary btn-dashboard"
                        >
                            <i class="fas fa-save me-2"></i>Update Attendance
                        </button>
                        <a
                            href="/attendance"
                            class="btn btn-secondary btn-dashboard"
                        >
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <th:block th:replace="fragments/styles :: common-scripts"></th:block>
    </body>
</html>
