<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Student Attendance - SchoolMS</title>
        <th:block th:replace="fragments/styles :: common-styles"></th:block>
    </head>
    <body>
        <!-- Sidebar -->
        <div th:replace="fragments/sidebar :: sidebar"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div>
                    <h1 class="page-title">
                        <i class="fas fa-user-graduate me-3"></i>
                        Attendance for <span th:text="${student.name}"></span>
                    </h1>
                    <p
                        class="section-subtitle"
                        th:text="'Class: ' + student.className"
                    ></p>
                </div>

                <div class="user-menu">
                    <button class="theme-toggle" onclick="toggleTheme()">
                        <i class="fas fa-moon me-2"></i>
                        Dark Mode
                    </button>
                    <button class="sidebar-toggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>

            <!-- Statistics Cards -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="dashboard-card text-center">
                        <i
                            class="fas fa-calendar-check fa-3x text-success mb-3"
                        ></i>
                        <div class="stat-number" th:text="${totalDays}">0</div>
                        <h5 class="card-title">Total Days</h5>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="dashboard-card text-center">
                        <i
                            class="fas fa-check-circle fa-3x text-primary mb-3"
                        ></i>
                        <div class="stat-number" th:text="${presentDays}">
                            0
                        </div>
                        <h5 class="card-title">Present Days</h5>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="dashboard-card text-center">
                        <i
                            class="fas fa-times-circle fa-3x text-danger mb-3"
                        ></i>
                        <div class="stat-number" th:text="${absentDays}">0</div>
                        <h5 class="card-title">Absent Days</h5>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="dashboard-card text-center">
                        <i class="fas fa-clock fa-3x text-warning mb-3"></i>
                        <div class="stat-number" th:text="${lateDays}">0</div>
                        <h5 class="card-title">Late Days</h5>
                    </div>
                </div>
            </div>

            <!-- Attendance Percentage -->
            <div class="dashboard-card text-center mb-4">
                <h4 class="card-title">Attendance Percentage</h4>
                <div class="progress" style="height: 30px">
                    <div
                        class="progress-bar bg-success"
                        role="progressbar"
                        th:style="'width: ' + ${attendancePercentage} + '%'"
                        th:text="${#numbers.formatDecimal(attendancePercentage, 1, 1) + '%'}"
                    ></div>
                </div>
            </div>

            <div class="dashboard-card">
                <div
                    class="d-flex justify-content-between align-items-center mb-4"
                >
                    <h3 class="card-title mb-0">
                        <i class="fas fa-list me-2"></i>
                        Attendance History
                    </h3>
                    <a
                        href="/attendance"
                        class="btn btn-secondary btn-dashboard"
                    >
                        <i class="fas fa-arrow-left me-2"></i>Back to All
                        Attendance
                    </a>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Status</th>

                                <th>Remarks</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="attendance : ${attendanceList}">
                                <td
                                    th:text="${#temporals.format(attendance.date, 'dd/MM/yyyy')}"
                                ></td>
                                <td>
                                    <span
                                        th:class="${'badge ' + (attendance.status == 'Present' ? 'bg-success' :
                                                           attendance.status == 'Absent' ? 'bg-danger' :
                                                           attendance.status == 'Late' ? 'bg-warning' : 'bg-info')}"
                                        th:text="${attendance.status}"
                                    >
                                    </span>
                                </td>

                                <td
                                    th:text="${attendance.remarks != null ? attendance.remarks : ''}"
                                ></td>
                                <td>
                                    <a
                                        th:href="@{/attendance/edit/{id}(id=${attendance.id})}"
                                        class="btn btn-sm btn-warning me-1"
                                    >
                                        <i class="fas fa-edit me-1"></i>Edit
                                    </a>
                                    <a
                                        th:href="@{/attendance/delete/{id}(id=${attendance.id})}"
                                        class="btn btn-sm btn-danger"
                                        onclick="return confirm('Are you sure you want to delete this attendance record?')"
                                    >
                                        <i class="fas fa-trash me-1"></i>Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <th:block th:replace="fragments/styles :: common-scripts"></th:block>
    </body>
</html>
