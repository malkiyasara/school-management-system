<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Attendance Management - SchoolMS</title>
        <th:block th:replace="fragments/styles :: common-styles"></th:block>
    </head>
    <body>
        <!-- Sidebar -->
        <div th:replace="fragments/sidebar :: sidebar"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div>
                    <h1 class="page-title">
                        <i class="fas fa-calendar-check me-3"></i>
                        Attendance Management
                    </h1>
                    <p class="section-subtitle">
                        Track and manage student attendance
                    </p>
                </div>

                <div class="user-menu">
                    <button class="theme-toggle" onclick="toggleTheme()">
                        <i class="fas fa-moon me-2"></i>
                        Dark Mode
                    </button>
                    <button class="sidebar-toggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>

            <div class="dashboard-card">
                <div
                    class="d-flex justify-content-between align-items-center mb-4"
                >
                    <h3 class="card-title mb-0">
                        <i class="fas fa-list me-2"></i>
                        All Attendance Records
                    </h3>
                    <div>
                        <a
                            href="/attendance/mark"
                            class="btn btn-primary btn-dashboard me-2"
                        >
                            <i class="fas fa-plus me-2"></i>Mark Attendance
                        </a>
                    </div>
                </div>

                <!-- Filter Section -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <label for="dateFilter" class="form-label"
                            >Filter by Date:</label
                        >
                        <input
                            type="date"
                            class="form-control"
                            id="dateFilter"
                            onchange="filterByDate(this.value)"
                        />
                    </div>
                    <div class="col-md-4">
                        <label for="statusFilter" class="form-label"
                            >Filter by Status:</label
                        >
                        <select
                            class="form-control"
                            id="statusFilter"
                            onchange="filterByStatus(this.value)"
                        >
                            <option value="">All Status</option>
                            <option value="Present">Present</option>
                            <option value="Absent">Absent</option>
                            <option value="Late">Late</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="classFilter" class="form-label"
                            >Filter by Class:</label
                        >
                        <select
                            class="form-control"
                            id="classFilter"
                            onchange="filterByClass(this.value)"
                        >
                            <option value="">All Classes</option>
                            <option value="Class 1">Class 1</option>
                            <option value="Class 2">Class 2</option>
                            <option value="Class 3">Class 3</option>
                            <option value="Class 4">Class 4</option>
                            <option value="Class 5">Class 5</option>
                        </select>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Student Name</th>
                                <th>Class</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Remarks</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="attendance : ${attendanceList}">
                                <td th:text="${attendance.id}"></td>
                                <td
                                    th:text="${attendance.student != null ? attendance.student.name : 'N/A'}"
                                ></td>
                                <td th:text="${attendance.className}"></td>
                                <td
                                    th:text="${#temporals.format(attendance.date, 'dd/MM/yyyy')}"
                                ></td>
                                <td>
                                    <span
                                        th:class="${'badge ' + (attendance.status == 'Present' ? 'bg-success' :
                                                           attendance.status == 'Absent' ? 'bg-danger' :
                                                           attendance.status == 'Late' ? 'bg-warning' : 'bg-info')}"
                                        th:text="${attendance.status}"
                                    >
                                    </span>
                                </td>
                                <td
                                    th:text="${attendance.remarks != null ? attendance.remarks : ''}"
                                ></td>
                                <td>
                                    <a
                                        th:href="@{/attendance/edit/{id}(id=${attendance.id})}"
                                        class="btn btn-sm btn-warning me-1"
                                    >
                                        <i class="fas fa-edit me-1"></i>Edit
                                    </a>
                                    <a
                                        th:href="@{/attendance/delete/{id}(id=${attendance.id})}"
                                        class="btn btn-sm btn-danger"
                                        onclick="return confirm('Are you sure you want to delete this attendance record?')"
                                    >
                                        <i class="fas fa-trash me-1"></i>Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <th:block th:replace="fragments/styles :: common-scripts"></th:block>

        <script>
            function filterByDate(date) {
                if (date) {
                    window.location.href = `/attendance/by-date?date=${date}`;
                }
            }

            function filterByStatus(status) {
                if (status) {
                    const rows = document.querySelectorAll("tbody tr");
                    rows.forEach((row) => {
                        const statusCell = row.querySelector("td:nth-child(5)");
                        if (
                            statusCell &&
                            statusCell.textContent.trim() === status
                        ) {
                            row.style.display = "";
                        } else {
                            row.style.display = "none";
                        }
                    });
                } else {
                    const rows = document.querySelectorAll("tbody tr");
                    rows.forEach((row) => (row.style.display = ""));
                }
            }

            function filterByClass(className) {
                if (className) {
                    const rows = document.querySelectorAll("tbody tr");
                    rows.forEach((row) => {
                        const classCell = row.querySelector("td:nth-child(3)");
                        if (
                            classCell &&
                            classCell.textContent.trim() === className
                        ) {
                            row.style.display = "";
                        } else {
                            row.style.display = "none";
                        }
                    });
                } else {
                    const rows = document.querySelectorAll("tbody tr");
                    rows.forEach((row) => (row.style.display = ""));
                }
            }
        </script>
    </body>
</html>
